<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>

    <title>Etch a Sketch</title>
  </head>

  <body>
    <!-- Page Heading -->
    <h1>Etch a Sketch!</h1>

    <!-- All Buttons -->
    <div id="buttons">
      <form id="size-form">
        <button id="edit">SIZE</button>
        <input id="size-input" type="text" />
      </form>

      <form id="reset-form">
        <button id="reset">RESET</button>
      </form>

      <form id="color-form">
        <button id="color">COLOR</button>
      </form>
    </div>
    <h2 id="display"></h2>

    <h3 id="error" style="text-align: center"></h3>

    <!-- Container for Grid -->
    <div id="grid-container">
      <!-- Stuff goes here -->
    </div>
  </body>
</html>
